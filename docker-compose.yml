version: '3.8'

services:
  sender-db:
    image: postgres:16-alpine
    container_name: sender-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sender
      POSTGRES_PASSWORD: sender123
      POSTGRES_DB: whatsapp_sender
    volumes:
      - sender-pgdata:/var/lib/postgresql/data
    networks:
      - sender-network

  sender-redis:
    image: redis:7-alpine
    container_name: sender-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - sender-network

  sender-backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sender-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - sender-db
      - sender-redis
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
      - REDIS_URL=${REDIS_URL}
      - UAZAPI_URL=${UAZAPI_URL}
      - UAZAPI_GLOBAL_TOKEN=${UAZAPI_GLOBAL_TOKEN}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=3001
      - NODE_ENV=production
    networks:
      - sender-network

  sender-nginx:
    image: nginx:alpine
    container_name: sender-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sender-backend
    networks:
      - sender-network

networks:
  sender-network:
    driver: bridge

volumes:
  sender-pgdata:
